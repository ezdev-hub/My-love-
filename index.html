<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi niña ❤️</title>

<style>

body{
margin:0;
height:100vh;
background-image:url("spiderman.jpg");
background-size:contain;
background-position:center;
background-repeat:no-repeat;
background-color:black;
font-family:Arial, sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

/* MENSAJE */

.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:600px;
padding:20px;
font-size:18px;
line-height:1.6;
background:rgba(0,0,0,0.45);
border-radius:20px;
}

/* COSAS QUE CAEN */

.fall{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body onclick="burstEffect(event)">

<div class="message">

<h2>Mi niña 💖</h2>

<p>
Hoy quiero recordarte algo: eres una de las mejores cosas que me han pasado.
Gracias por existir y por hacer mi mundo más bonito cada día. 🖤
</p>

<p>
Toca la pantalla 🕷️
</p>

</div>

<script>

/* ARAÑAS Y TELARAÑAS CAYENDO */

function createFall(){

const element=document.createElement("div");
element.classList.add("fall");

const items=["🕷️","🕸️"];
element.innerHTML=items[Math.floor(Math.random()*items.length)];

element.style.left=Math.random()*100+"vw";
element.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(element);

setTimeout(()=>{
element.remove();
},10000);

}

setInterval(createFall,900);


/* EXPLOSION AL TOCAR */

function burstEffect(e){

const items=["🕷️","🕸️"];

for(let i=0;i<12;i++){

const part=document.createElement("div");

part.innerHTML=items[Math.floor(Math.random()*items.length)];

part.style.position="fixed";
part.style.left=e.clientX+"px";
part.style.top=e.clientY+"px";
part.style.fontSize="30px";

document.body.appendChild(part);

const x=(Math.random()*200-100);
const y=(Math.random()*200-100);

part.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:800
});

setTimeout(()=>{
part.remove();
},800);

}

}

</script>

</body>
</html>
